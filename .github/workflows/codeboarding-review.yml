name: CodeBoarding review

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize, closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: codeboarding-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Setup Java for JDTLS
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup .NET SDKs for C# LSP
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - uses: CodeBoarding/CodeBoarding-action@v1.5.0
        with:
          mode: review
